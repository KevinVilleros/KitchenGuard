name: cocinap_mobile
description: CocinaP mobile companion app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  provider: ^6.1.0
  shared_preferences: ^2.3.0
  multicast_dns: ^0.3.0
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^18.0.0
  cupertino_icons: ^1.0.8
  flutter_background_service: ^5.0.0
  flutter_background_service_android: ^6.0.0
  flutter_background_service_ios: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
